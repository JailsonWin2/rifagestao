<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gerenciamento de Raffle no WhatsApp</title>
</head>
<body>
    <header>
        <h1>Bem-vindo ao Sistema de Raffle</h1>
    </header>
    <main>
        <section>
            <h2>Como Funciona</h2>
            <p>Este sistema permite que você gerencie rifas de forma prática e fácil através do WhatsApp.</p>
        </section>
        <section>
            <h2>Configurações da Rifa</h2>
            <form>
                <label for="prize">Prêmio:</label>
                <input type="text" id="prize" name="prize" required>
                <label for="participants">Número de Participantes:</label>
                <input type="number" id="participants" name="participants" required>
                <button type="submit">Criar Rifa</button>
            </form>
        </section>
        <section>
            <h2>Resultados</h2>
            <button onclick="showResults()">Ver Resultados</button>
            <div id="results" style="display:none;"></div>
        </section>
    </main>
    <script>
        function showResults() {
            document.getElementById('results').style.display = 'block';
            // Lógica para mostrar os resultados
        }
    </script>
</body>
</html>
